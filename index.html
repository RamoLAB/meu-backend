<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">
<canvas id="g"></canvas>

<script>
const c = g;
const x = c.getContext("2d");

let p = { x: 50, y: 50 };
let k = {};

const PLAYER_ID = Math.random().toString(36).substring(2, 10);
const WS_URL = "wss://meu-backend-0rzt.onrender.com";

let stateBuffer = [];
const RENDER_DELAY = 50;

let world = {};
let lastDash = 0;

// resize
onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
onresize();

// input
onkeydown = e => {
    k[e.key] = 1;

    if (e.key === " ") {
        const now = Date.now();
        if (now - lastDash > 1500) {
            ws.send(JSON.stringify({ type: "dash", id: PLAYER_ID }));
            lastDash = now;
        }
    }
};

onkeyup = e => k[e.key] = 0;

// websocket
const ws = new WebSocket(WS_URL);

ws.onopen = () => {
    ws.send(JSON.stringify({ type: "join", id: PLAYER_ID }));
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "state") {

        world = data.world;

        stateBuffer.push({
            time: Date.now(),
            players: data.players,
            events: data.events
        });

        if (stateBuffer.length > 20) stateBuffer.shift();
    }
};

// envia intenção de movimento (não posição)
setInterval(() => {
    if (ws.readyState !== 1) return;

    ws.send(JSON.stringify({
        type: "input",
        id: PLAYER_ID,
        up: k.w || k.ArrowUp,
        down: k.s || k.ArrowDown,
        left: k.a || k.ArrowLeft,
        right: k.d || k.ArrowRight
    }));
}, 50);

// loop
function loop() {

    x.fillStyle = "#fff";
    x.fillRect(0, 0, c.width, c.height);

    const renderTime = Date.now() - RENDER_DELAY;

    let older, newer;

    for (let i = 0; i < stateBuffer.length - 1; i++) {
        if (
            stateBuffer[i].time <= renderTime &&
            stateBuffer[i + 1].time >= renderTime
        ) {
            older = stateBuffer[i];
            newer = stateBuffer[i + 1];
            break;
        }
    }

    let currentPlayers = {};

    if (older && newer) {

        const t = (renderTime - older.time) / (newer.time - older.time);

        for (let id in newer.players) {

            const p1 = older.players[id];
            const p2 = newer.players[id];
            if (!p1 || !p2) continue;

            currentPlayers[id] = {
                x: p1.x + (p2.x - p1.x) * t,
                y: p1.y + (p2.y - p1.y) * t,
                ...p2
            };
        }
    } else if (stateBuffer.length > 0) {
        currentPlayers = stateBuffer[stateBuffer.length - 1].players;
    }

    // arena
    const size = world.arena || 800;
    const mx = (c.width - size) / 2;
    const my = (c.height - size) / 2;

    x.strokeStyle = "#000";
    x.strokeRect(mx, my, size, size);

    let aliveCount = 0;

    for (let id in currentPlayers) {

        const pl = currentPlayers[id];
        if (!pl.alive) continue;

        aliveCount++;

        x.fillStyle = "#" + pl.color;
        x.fillRect(pl.x, pl.y, pl.size, pl.size);

        // hp bar
        x.fillStyle = "#000";
        x.fillRect(pl.x, pl.y - 6, pl.size * (pl.hp / 100), 3);
    }

    // UI
    x.fillStyle = "#000";
    x.font = "20px Arial";
    x.textAlign = "center";

    const timeLeft = Math.max(0, 60 - Math.floor(world.time / 1000));
    x.fillText("Tempo: " + timeLeft, c.width / 2, 30);

    x.fillText("Vivos: " + aliveCount, c.width / 2, 60);

    if (world.winner) {
        x.fillText("Vencedor: " + world.winner, c.width / 2, 100);
    }

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
