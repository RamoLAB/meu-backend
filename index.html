<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">
<canvas id="g"></canvas>

<script>
const c = g;
const x = c.getContext("2d");

let p = { x: 50, y: 50, s: 5 };
let k = {};

const PLAYER_ID = Math.random().toString(36).substring(2, 10);
const WS_URL = "wss://meu-backend-0rzt.onrender.com";

let serverPlayers = {};
let renderPlayers = {};

// resize
window.onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
window.onresize();

// input
onkeydown = e => k[e.key] = 1;
onkeyup = e => k[e.key] = 0;

// websocket
const ws = new WebSocket(WS_URL);

ws.onopen = () => {
    ws.send(JSON.stringify({
        type: "join",
        id: PLAYER_ID
    }));
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "state") {

        const newPlayers = data.players;

        for (let id in newPlayers) {

            if (!renderPlayers[id]) {
                renderPlayers[id] = {
                    x: newPlayers[id].x,
                    y: newPlayers[id].y,
                    vx: 0,
                    vy: 0
                };
            } else {

                let r = renderPlayers[id];
                let n = newPlayers[id];

                r.vx = (n.x - r.x);
                r.vy = (n.y - r.y);

                r.tx = n.x;
                r.ty = n.y;
            }
        }

        serverPlayers = newPlayers;
    }
};

// envio de posição
setInterval(() => {
    if (ws.readyState !== 1) return;

    ws.send(JSON.stringify({
        type: "move",
        id: PLAYER_ID,
        x: p.x,
        y: p.y
    }));
}, 50);

// loop principal
function loop() {

    if (k.ArrowUp || k.w) p.y -= p.s;
    if (k.ArrowDown || k.s) p.y += p.s;
    if (k.ArrowLeft || k.a) p.x -= p.s;
    if (k.ArrowRight || k.d) p.x += p.s;

    p.x = Math.max(0, Math.min(c.width - 30, p.x));
    p.y = Math.max(0, Math.min(c.height - 30, p.y));

    x.fillStyle = "#fff";
    x.fillRect(0, 0, c.width, c.height);

    for (let id in renderPlayers) {

        let r = renderPlayers[id];

        if (!serverPlayers[id]) continue;

        r.x += r.vx * 0.2;
        r.y += r.vy * 0.2;

        r.x += (serverPlayers[id].x - r.x) * 0.15;
        r.y += (serverPlayers[id].y - r.y) * 0.15;

        x.fillStyle = "#" + intToColor(id);
        x.fillRect(r.x, r.y, 30, 30);
    }

    requestAnimationFrame(loop);
}

loop();

// cor fixa por id
function intToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    let color = (hash & 0x00FFFFFF).toString(16).toUpperCase();
    return "000000".substring(0, 6 - color.length) + color;
}
</script>

</body>
</html>
