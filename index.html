<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">
<canvas id="g"></canvas>

<script>
const c = g;
const x = c.getContext("2d");

let p = { x: 50, y: 50, s: 5 };
let k = {};
let alive = true;

const PLAYER_ID = Math.random().toString(36).substring(2, 10);
const WS_URL = "wss://meu-backend-0rzt.onrender.com";

let stateBuffer = [];
const RENDER_DELAY = 50;

let world = {
    time: 0,
    arena: 1000
};

// resize
window.onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
window.onresize();

// input
onkeydown = e => k[e.key] = 1;
onkeyup = e => k[e.key] = 0;

// websocket
const ws = new WebSocket(WS_URL);

ws.onopen = () => {
    ws.send(JSON.stringify({
        type: "join",
        id: PLAYER_ID
    }));
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "state") {

        world = data.world;

        stateBuffer.push({
            time: Date.now(),
            players: data.players
        });

        if (stateBuffer.length > 20) {
            stateBuffer.shift();
        }
    }
};

// envio de posição
setInterval(() => {
    if (ws.readyState !== 1) return;
    if (!alive) return;

    ws.send(JSON.stringify({
        type: "move",
        id: PLAYER_ID,
        x: p.x,
        y: p.y
    }));
}, 50);

// loop
function loop() {

    if (alive) {
        if (k.ArrowUp || k.w) p.y -= p.s;
        if (k.ArrowDown || k.s) p.y += p.s;
        if (k.ArrowLeft || k.a) p.x -= p.s;
        if (k.ArrowRight || k.d) p.x += p.s;
    }

    // limites tela
    p.x = Math.max(0, Math.min(c.width - 30, p.x));
    p.y = Math.max(0, Math.min(c.height - 30, p.y));

    x.fillStyle = "#fff";
    x.fillRect(0, 0, c.width, c.height);

    // =====================
    // ARENA (CENTRALIZADA)
    // =====================

    const arenaSize = world.arena;

    const ax = (c.width - arenaSize) / 2;
    const ay = (c.height - arenaSize) / 2;

    // fundo arena
    x.fillStyle = "#f5f5f5";
    x.fillRect(ax, ay, arenaSize, arenaSize);

    // borda
    x.strokeStyle = "#000";
    x.lineWidth = 4;
    x.strokeRect(ax, ay, arenaSize, arenaSize);

    // =====================
    // MORTE
    // =====================

    if (
        p.x < ax ||
        p.y < ay ||
        p.x + 30 > ax + arenaSize ||
        p.y + 30 > ay + arenaSize
    ) {
        alive = false;
    }

    // =====================
    // RENDER PLAYERS
    // =====================

    const renderTime = Date.now() - RENDER_DELAY;

    let older, newer;

    for (let i = 0; i < stateBuffer.length - 1; i++) {
        if (
            stateBuffer[i].time <= renderTime &&
            stateBuffer[i + 1].time >= renderTime
        ) {
            older = stateBuffer[i];
            newer = stateBuffer[i + 1];
            break;
        }
    }

    if (older && newer) {
        const t = (renderTime - older.time) / (newer.time - older.time);

        for (let id in newer.players) {

            if (id === PLAYER_ID) continue;

            const p1 = older.players[id];
            const p2 = newer.players[id];
            if (!p1 || !p2) continue;

            const ix = p1.x + (p2.x - p1.x) * t;
            const iy = p1.y + (p2.y - p1.y) * t;

            x.fillStyle = "#" + intToColor(id);
            x.fillRect(ix, iy, 30, 30);
        }
    }

    // você
    if (alive) {
        x.fillStyle = "#000";
        x.fillRect(p.x, p.y, 30, 30);
    } else {
        x.fillStyle = "red";
        x.font = "40px Arial";
        x.textAlign = "center";
        x.fillText("ELIMINADO", c.width / 2, c.height / 2);
    }

    // =====================
    // CRONÔMETRO GLOBAL
    // =====================

    const timeLeft = Math.max(0, 60 - Math.floor(world.time / 1000));

    x.fillStyle = "#000";
    x.font = "20px Arial";
    x.textAlign = "center";
    x.fillText("Tempo: " + timeLeft + "s", c.width / 2, 30);

    requestAnimationFrame(loop);
}

loop();

// cor por id
function intToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    let color = (hash & 0x00FFFFFF).toString(16).toUpperCase();
    return "000000".substring(0, 6 - color.length) + color;
}
</script>

</body>
</html>
