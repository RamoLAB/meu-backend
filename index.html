<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">
<canvas id="g"></canvas>

<script>
const c = g;
const x = c.getContext("2d");

let p = { x: 50, y: 50, s: 5 };
let k = {};

const PLAYER_ID = Math.random().toString(36).substring(2, 10);
const WS_URL = "wss://meu-backend-0rzt.onrender.com";

let stateBuffer = [];
const RENDER_DELAY = 50;

let worldTime = 0;
let mouse = { x: 0, y: 0 };

// resize
onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
onresize();

// input teclado
onkeydown = e => k[e.key] = 1;
onkeyup = e => k[e.key] = 0;

// mouse
onmousemove = e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
};

// tiro
onclick = () => {
    if (ws.readyState !== 1) return;

    const cx = p.x + 15;
    const cy = p.y + 15;

    const dx = mouse.x - cx;
    const dy = mouse.y - cy;
    const len = Math.hypot(dx, dy);

    const dirX = dx / len;
    const dirY = dy / len;

    ws.send(JSON.stringify({
        type: "shoot",
        id: PLAYER_ID,
        x: cx,
        y: cy,
        dx: dirX,
        dy: dirY
    }));
};

// websocket
const ws = new WebSocket(WS_URL);

ws.onopen = () => {
    ws.send(JSON.stringify({ type: "join", id: PLAYER_ID }));
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "state") {

        if (data.world) worldTime = data.world.time;

        stateBuffer.push({
            time: Date.now(),
            players: data.players,
            bullets: data.bullets || []
        });

        if (stateBuffer.length > 20) stateBuffer.shift();
    }
};

// envio posição
setInterval(() => {
    if (ws.readyState !== 1) return;

    ws.send(JSON.stringify({
        type: "move",
        id: PLAYER_ID,
        x: p.x,
        y: p.y
    }));
}, 50);

// loop
function loop() {

    if (k.ArrowUp || k.w) p.y -= p.s;
    if (k.ArrowDown || k.s) p.y += p.s;
    if (k.ArrowLeft || k.a) p.x -= p.s;
    if (k.ArrowRight || k.d) p.x += p.s;

    p.x = Math.max(0, Math.min(c.width - 30, p.x));
    p.y = Math.max(0, Math.min(c.height - 30, p.y));

    x.fillStyle = "#fff";
    x.fillRect(0, 0, c.width, c.height);

    if (stateBuffer.length > 0) {

        const latest = stateBuffer[stateBuffer.length - 1];

        // players
        for (let id in latest.players) {
            const pl = latest.players[id];

            x.fillStyle = "#" + pl.color;
            x.fillRect(pl.x, pl.y, 30, 30);
        }

        // bullets
        x.fillStyle = "#000";
        latest.bullets.forEach(b => {
            x.fillRect(b.x, b.y, 5, 5);
        });
    }

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
