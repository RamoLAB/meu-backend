<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">
<canvas id="g"></canvas>

<script>
const c = g;
const x = c.getContext("2d");

// =====================
// PLAYER (AGORA COM FÍSICA)
// =====================

let p = {
    x: 50,
    y: 50,
    angle: 0,
    speed: 0
};

let k = {};

const PLAYER_ID = Math.random().toString(36).substring(2, 10);
const WS_URL = "wss://meu-backend-0rzt.onrender.com";

let stateBuffer = [];
const RENDER_DELAY = 50;

// =====================
// CARRO
// =====================

function drawCar(ctx, px, py, angle, color) {
    ctx.save();
    ctx.translate(px + 15, py + 15);
    ctx.rotate(angle);

    drawBaseF1(ctx, 30, color, "#111", "#fff");

    ctx.restore();
}

function drawBaseF1(ctx, s, bodyColor, wingColor, detailColor = '#fff') {
    ctx.fillStyle = '#111';
    ctx.fillRect(-13, -11, 6, 8);
    ctx.fillRect(7, -11, 6, 8);
    ctx.fillRect(-14, 5, 7, 9);
    ctx.fillRect(7, 5, 7, 9);

    ctx.fillStyle = '#444';
    ctx.fillRect(-7, -8, 14, 2);
    ctx.fillRect(-8, 9, 16, 2);

    ctx.fillStyle = wingColor;
    ctx.fillRect(-11, -13, 22, 3);

    ctx.fillStyle = bodyColor;
    ctx.fillRect(-4, -10, 8, 20);
    ctx.fillRect(-7, 1, 14, 6);

    ctx.fillStyle = wingColor;
    ctx.fillRect(-10, 13, 20, 4);

    ctx.fillStyle = detailColor;
    ctx.fillRect(-2, -1, 4, 4);

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(-3, -7, 2, 4);
}

// resize
window.onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
window.onresize();

// input
onkeydown = e => k[e.key] = 1;
onkeyup = e => k[e.key] = 0;

// websocket
const ws = new WebSocket(WS_URL);

ws.onopen = () => {
    ws.send(JSON.stringify({
        type: "join",
        id: PLAYER_ID
    }));
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "state") {
        stateBuffer.push({
            time: Date.now(),
            players: data.players
        });

        if (stateBuffer.length > 20) {
            stateBuffer.shift();
        }
    }
};

// envio
setInterval(() => {
    if (ws.readyState !== 1) return;

    ws.send(JSON.stringify({
        type: "move",
        id: PLAYER_ID,
        x: p.x,
        y: p.y,
        angle: p.angle
    }));
}, 50);

// =====================
// LOOP
// =====================

function loop() {

    // CONTROLES (ESTILO CARRO)
    if (k.ArrowLeft || k.a) p.angle -= 0.05;
    if (k.ArrowRight || k.d) p.angle += 0.05;

    if (k.ArrowUp || k.w) p.speed += 0.2;
    if (k.ArrowDown || k.s) p.speed -= 0.2;

    // atrito
    p.speed *= 0.95;

    // movimento baseado no ângulo
    p.x += Math.cos(p.angle) * p.speed;
    p.y += Math.sin(p.angle) * p.speed;

    x.fillStyle = "#fff";
    x.fillRect(0, 0, c.width, c.height);

    const renderTime = Date.now() - RENDER_DELAY;

    let older, newer;

    for (let i = 0; i < stateBuffer.length - 1; i++) {
        if (
            stateBuffer[i].time <= renderTime &&
            stateBuffer[i + 1].time >= renderTime
        ) {
            older = stateBuffer[i];
            newer = stateBuffer[i + 1];
            break;
        }
    }

    // OUTROS
    if (older && newer) {

        const t = (renderTime - older.time) / (newer.time - older.time);

        for (let id in newer.players) {

            if (id === PLAYER_ID) continue;

            const p1 = older.players[id];
            const p2 = newer.players[id];
            if (!p1 || !p2) continue;

            const ix = p1.x + (p2.x - p1.x) * t;
            const iy = p1.y + (p2.y - p1.y) * t;

            const ia = (p1.angle || 0) + ((p2.angle || 0) - (p1.angle || 0)) * t;

            drawCar(x, ix, iy, ia, "#" + intToColor(id));
        }
    }

    // fallback
    else if (stateBuffer.length > 0) {
        const latest = stateBuffer[stateBuffer.length - 1];

        for (let id in latest.players) {
            if (id === PLAYER_ID) continue;

            const pl = latest.players[id];
            drawCar(x, pl.x, pl.y, pl.angle || 0, "#" + intToColor(id));
        }
    }

    // VOCÊ
    drawCar(x, p.x, p.y, p.angle, "#000");

    requestAnimationFrame(loop);
}

loop();

// cor
function intToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    let color = (hash & 0x00FFFFFF).toString(16).toUpperCase();
    return "000000".substring(0, 6 - color.length) + color;
}
</script>

</body>
</html>
