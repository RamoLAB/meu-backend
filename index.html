<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#111">
<canvas id="g"></canvas>

<!-- ================= HUD ================= -->
<div id="hud">

    <!-- SEMÁFORO -->
    <div id="lights">
        <div class="light red"></div>
        <div class="light red"></div>
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
        <div class="label">LARGADA</div>
    </div>

    <!-- POSIÇÕES -->
    <div id="positions">
        <h3>Posições</h3>
        <div>1 🥇</div>
        <div>2 🥈</div>
        <div>3 🥉</div>
        <div>4</div>
        <div>5</div>
    </div>

    <!-- PNEUS / BOOST -->
    <div id="status">
        <div class="bar">
            <label>Pneus</label>
            <div class="meter"><div id="tireBar"></div></div>
        </div>

        <div class="bar">
            <label>Boost</label>
            <div class="meter"><div id="boostBar"></div></div>
        </div>
    </div>

    <!-- VOLTAS -->
    <div id="laps">
        4 / 5
    </div>

    <!-- PEDAIS -->
    <div id="pedals">
        <div class="pedal brake">FREIO</div>
        <div class="pedal accel">ACELERADOR</div>
    </div>

</div>

<style>
/* HUD base */
#hud {
    position:absolute;
    inset:0;
    pointer-events:none;
    color:white;
    font-family:Arial;
}

/* SEMÁFORO */
#lights {
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}
.light {
    width:18px;
    height:18px;
    border-radius:50%;
    margin:4px auto;
    background:#333;
}
.red { background:#900; }
.yellow { background:#aa0; }
.green { background:#0a0; }

.label {
    font-size:12px;
    margin-top:4px;
}

/* POSIÇÕES */
#positions {
    position:absolute;
    top:20px;
    right:20px;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:8px;
}

/* STATUS */
#status {
    position:absolute;
    bottom:20px;
    right:20px;
    width:180px;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:8px;
}

.bar {
    margin-bottom:10px;
}

.meter {
    width:100%;
    height:10px;
    background:#333;
}

#tireBar {
    width:70%;
    height:100%;
    background:#0af;
}

#boostBar {
    width:40%;
    height:100%;
    background:#ff0;
}

/* VOLTAS */
#laps {
    position:absolute;
    top:20px;
    left:20px;
    font-size:18px;
    background:rgba(0,0,0,0.5);
    padding:8px;
    border-radius:6px;
}

/* PEDAIS */
#pedals {
    position:absolute;
    bottom:20px;
    left:20px;
    display:flex;
    gap:10px;
}

.pedal {
    width:100px;
    height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.6);
    border-radius:8px;
    font-size:12px;
}

.brake { border:2px solid #f00; }
.accel { border:2px solid #0f0; }

</style>

<script>
// apenas placeholder visual (sem mecânica ainda)

// simulação de barras animando
setInterval(()=>{
    document.getElementById("tireBar").style.width =
        (50 + Math.random()*50) + "%";

    document.getElementById("boostBar").style.width =
        (Math.random()*100) + "%";
}, 500);
</script>

</body>
</html>
