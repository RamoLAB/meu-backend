<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">

<canvas id="g"></canvas>

<div id="pedals">
    <div id="brake" class="pedal">FREIO</div>
    <div id="accel" class="pedal">ACELERAR</div>
</div>

<style>
#pedals{
    position:absolute;
    bottom:20px;
    right:20px;
    display:flex;
    gap:10px;
}
.pedal{
    width:100px;
    height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    background:rgba(0,0,0,0.6);
    border-radius:10px;
    user-select:none;
}
#brake{ border:2px solid red; }
#accel{ border:2px solid green; }
</style>

<script>
const c = g;
const x = c.getContext("2d");

const PLAYER_ID = Math.random().toString(36).substring(2, 10);
const WS_URL = "wss://meu-backend-0rzt.onrender.com";

let k = {};
let accelPressed = false;
let brakePressed = false;

// =========================
// CAR STATE (CORRETO)
// =========================
let p = {
    x: 200,
    y: 200,
    angle: 0,
    speed: 0,
    maxSpeed: 6,
    accel: 0.25,
    friction: 0.96,
    turnSpeed: 0.05
};

// =========================
// INPUT
// =========================
onkeydown = e => k[e.key] = 1;
onkeyup = e => k[e.key] = 0;

const accel = document.getElementById("accel");
const brake = document.getElementById("brake");

accel.onmousedown = () => accelPressed = true;
accel.onmouseup = () => accelPressed = false;
accel.onmouseleave = () => accelPressed = false;

brake.onmousedown = () => brakePressed = true;
brake.onmouseup = () => brakePressed = false;
brake.onmouseleave = () => brakePressed = false;

accel.ontouchstart = () => accelPressed = true;
accel.ontouchend = () => accelPressed = false;

brake.ontouchstart = () => brakePressed = true;
brake.ontouchend = () => brakePressed = false;

// =========================
// SPRITE
// =========================
function drawCar(ctx){
    ctx.fillStyle = "#d40000";
    ctx.fillRect(-15, -15, 30, 30);
}

// =========================
// WEBSOCKET
// =========================
let stateBuffer = [];
const RENDER_DELAY = 50;

const ws = new WebSocket(WS_URL);

ws.onopen = () => {
    ws.send(JSON.stringify({ type:"join", id:PLAYER_ID }));
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "state") {
        stateBuffer.push({
            time: Date.now(),
            players: data.players
        });

        if (stateBuffer.length > 20) stateBuffer.shift();
    }
};

setInterval(()=>{
    if(ws.readyState !== 1) return;

    ws.send(JSON.stringify({
        type:"move",
        id:PLAYER_ID,
        x:p.x,
        y:p.y
    }));
},50);

// =========================
// RESIZE
// =========================
window.onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
window.onresize();

// =========================
// LOOP
// =========================
function loop(){

    // ROTAÇÃO (independente)
    if (k.ArrowLeft || k.a) p.angle -= p.turnSpeed;
    if (k.ArrowRight || k.d) p.angle += p.turnSpeed;

    // ACELERAÇÃO (somente pedal)
    if (accelPressed) {
        p.speed += p.accel;
    }

    // FREIO = corta velocidade
    if (brakePressed) {
        p.speed *= 0.7;
    }

    // limite
    p.speed = Math.max(0, Math.min(p.maxSpeed, p.speed));

    // movimento real
    p.x += Math.cos(p.angle) * p.speed;
    p.y += Math.sin(p.angle) * p.speed;

    // inércia
    p.speed *= p.friction;

    // =====================
    // RENDER
    // =====================
    x.fillStyle = "#fff";
    x.fillRect(0,0,c.width,c.height);

    const renderTime = Date.now() - RENDER_DELAY;

    let older, newer;

    for(let i=0;i<stateBuffer.length-1;i++){
        if(stateBuffer[i].time <= renderTime && stateBuffer[i+1].time >= renderTime){
            older = stateBuffer[i];
            newer = stateBuffer[i+1];
            break;
        }
    }

    if(older && newer){
        const t = (renderTime - older.time)/(newer.time - older.time);

        for(let id in newer.players){
            if(id === PLAYER_ID) continue;

            const p1 = older.players[id];
            const p2 = newer.players[id];
            if(!p1 || !p2) continue;

            const ix = p1.x + (p2.x - p1.x)*t;
            const iy = p1.y + (p2.y - p1.y)*t;

            x.fillStyle = "#888";
            x.fillRect(ix, iy, 30, 30);
        }
    }

    // VOCÊ (com rotação)
    x.save();
    x.translate(p.x, p.y);
    x.rotate(p.angle);
    drawCar(x);
    x.restore();

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
