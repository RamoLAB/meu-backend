<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">
<canvas id="g"></canvas>

<script>
const c = g, x = c.getContext("2d");

let p = { x: 50, y: 50, s: 5 };
let k = {};

const PLAYER_ID = Math.random().toString(36).substring(2, 10);
const SERVER_URL = "https://meu-backend-0rzt.onrender.com";

let playersCache = {};
let worldTime = 0;

// resize
window.onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
window.onresize();

// input
onkeydown = e => k[e.key] = 1;
onkeyup = e => k[e.key] = 0;

// players (2x por segundo)
setInterval(() => {
    fetch(SERVER_URL + "/players")
        .then(r => r.json())
        .then(data => playersCache = data)
        .catch(() => {});
}, 500);

// posição (5x por segundo)
setInterval(() => {
    fetch(SERVER_URL + "/posicao", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: PLAYER_ID,
            x: p.x,
            y: p.y
        })
    }).catch(() => {});
}, 200);

// world time (cronômetro global)
setInterval(() => {
    fetch(SERVER_URL + "/world")
        .then(r => r.json())
        .then(data => worldTime = data.time)
        .catch(() => {});
}, 500);

// loop render
function loop() {

    // movimento local (fluido)
    if (k.ArrowUp || k.w) p.y -= p.s;
    if (k.ArrowDown || k.s) p.y += p.s;
    if (k.ArrowLeft || k.a) p.x -= p.s;
    if (k.ArrowRight || k.d) p.x += p.s;

    p.x = Math.max(0, Math.min(c.width - 30, p.x));
    p.y = Math.max(0, Math.min(c.height - 30, p.y));

    // fundo
    x.fillStyle = "#fff";
    x.fillRect(0, 0, c.width, c.height);

    // players
    for (let id in playersCache) {
        const pl = playersCache[id];
        if (!pl) continue;

        let color = "#" + intToColor(id);

        x.fillStyle = color;
        x.fillRect(pl.x, pl.y, 30, 30);
    }

    // cronômetro global
    const timeLeft = 60 - Math.floor((worldTime / 1000) % 60);

    x.fillStyle = "#000";
    x.font = "20px Arial";
    x.textAlign = "center";
    x.fillText("Tempo: " + timeLeft + "s", c.width / 2, 30);

    requestAnimationFrame(loop);
}

loop();

// hash de cor por ID
function intToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    let color = (hash & 0x00FFFFFF).toString(16).toUpperCase();
    return "000000".substring(0, 6 - color.length) + color;
}
</script>

</body>
</html>
