<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#ccc">
<canvas id="g"></canvas>

<script>
const c = g;
const x = c.getContext("2d");

// =====================
// PLAYER (COM ROTAÇÃO)
// =====================
let p = { x: 50, y: 50, s: 5, angle: 0, targetAngle: 0 };
let k = {};

const PLAYER_ID = Math.random().toString(36).substring(2, 10);
const WS_URL = "wss://meu-backend-0rzt.onrender.com";

let stateBuffer = [];
const RENDER_DELAY = 50;

// =====================
// CARROS
// =====================

function drawBaseF1(ctx, bodyColor, wingColor, detailColor = '#fff') {
    ctx.fillStyle = '#111';
    ctx.fillRect(2, 4, 6, 8);
    ctx.fillRect(22, 4, 6, 8);
    ctx.fillRect(1, 20, 7, 9);
    ctx.fillRect(22, 20, 7, 9);

    ctx.fillStyle = '#444';
    ctx.fillRect(8, 7, 14, 2);
    ctx.fillRect(7, 24, 16, 2);

    ctx.fillStyle = wingColor;
    ctx.fillRect(4, 2, 22, 3);

    ctx.fillStyle = bodyColor;
    ctx.fillRect(11, 5, 8, 20);
    ctx.fillRect(8, 16, 14, 6);

    ctx.fillStyle = wingColor;
    ctx.fillRect(5, 26, 20, 4);

    ctx.fillStyle = detailColor;
    ctx.fillRect(13, 14, 4, 4);
}

const CAR_MODELS = [
    (ctx)=>drawBaseF1(ctx,'#d40000','#111'),
    (ctx)=>drawBaseF1(ctx,'#c0c0c0','#00d2be'),
    (ctx)=>drawBaseF1(ctx,'#0600ef','#fcd700'),
    (ctx)=>drawBaseF1(ctx,'#111','#cfb53b'),
    (ctx)=>drawBaseF1(ctx,'#004225','#fff'),
    (ctx)=>drawBaseF1(ctx,'#ff8700','#004cff'),
    (ctx)=>drawBaseF1(ctx,'#ffffff','#dd0000'),
    (ctx)=>drawBaseF1(ctx,'#222','#111'),
    (ctx)=>drawBaseF1(ctx,'#fff200','#000'),
    (ctx)=>drawBaseF1(ctx,'#ff00ff','#4b0082'),
    (ctx)=>drawBaseF1(ctx,'#0093cc','#000')
];

let carSprites = {};

function getCarSprite(id){
    if(carSprites[id]) return carSprites[id];

    const canvas = document.createElement("canvas");
    canvas.width = 30;
    canvas.height = 30;
    const ctx = canvas.getContext("2d");

    const modelIndex = Math.abs(hash(id)) % CAR_MODELS.length;
    CAR_MODELS[modelIndex](ctx);

    carSprites[id] = canvas;
    return canvas;
}

function hash(str){
    let h = 0;
    for(let i=0;i<str.length;i++){
        h = str.charCodeAt(i) + ((h<<5)-h);
    }
    return h;
}

// =====================
// RESIZE
// =====================

window.onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
window.onresize();

// =====================
// INPUT
// =====================

onkeydown = e => k[e.key] = 1;
onkeyup = e => k[e.key] = 0;

// =====================
// WEBSOCKET
// =====================

const ws = new WebSocket(WS_URL);

ws.onopen = () => {
    ws.send(JSON.stringify({ type:"join", id:PLAYER_ID }));
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "state") {
        stateBuffer.push({
            time: Date.now(),
            players: data.players
        });

        if (stateBuffer.length > 20) stateBuffer.shift();
    }
};

// envio
setInterval(()=>{
    if(ws.readyState !== 1) return;

    ws.send(JSON.stringify({
        type:"move",
        id:PLAYER_ID,
        x:p.x,
        y:p.y
    }));
},50);

// =====================
// LOOP
// =====================

function loop(){

    // movimento + direção
    if (k.ArrowUp || k.w) { p.y -= p.s; p.targetAngle = -Math.PI/2; }
    if (k.ArrowDown || k.s) { p.y += p.s; p.targetAngle = Math.PI/2; }
    if (k.ArrowLeft || k.a) { p.x -= p.s; p.targetAngle = Math.PI; }
    if (k.ArrowRight || k.d) { p.x += p.s; p.targetAngle = 0; }

    // interpolação angular (suave)
    let diff = p.targetAngle - p.angle;
    diff = ((diff + Math.PI) % (2 * Math.PI)) - Math.PI;
    p.angle += diff * 0.2;

    p.x = Math.max(0, Math.min(c.width - 30, p.x));
    p.y = Math.max(0, Math.min(c.height - 30, p.y));

    x.fillStyle = "#ccc";
    x.fillRect(0, 0, c.width, c.height);

    const renderTime = Date.now() - RENDER_DELAY;

    let older, newer;

    for(let i=0;i<stateBuffer.length-1;i++){
        if(stateBuffer[i].time <= renderTime && stateBuffer[i+1].time >= renderTime){
            older = stateBuffer[i];
            newer = stateBuffer[i+1];
            break;
        }
    }

    // OUTROS players (sem rotação ainda)
    if(older && newer){
        const t = (renderTime - older.time)/(newer.time - older.time);

        for(let id in newer.players){

            if(id === PLAYER_ID) continue;

            const p1 = older.players[id];
            const p2 = newer.players[id];
            if(!p1 || !p2) continue;

            const ix = p1.x + (p2.x - p1.x)*t;
            const iy = p1.y + (p2.y - p1.y)*t;

            x.drawImage(getCarSprite(id), ix, iy);
        }
    }

    // =====================
    // SEU CARRO COM ROTAÇÃO
    // =====================
    x.save();
    x.translate(p.x + 15, p.y + 15);
    x.rotate(p.angle);
    x.drawImage(getCarSprite(PLAYER_ID), -15, -15);
    x.restore();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
