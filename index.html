<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">
<canvas id="g"></canvas>

<script>
const c = g;
const x = c.getContext("2d");

let p = { x: 50, y: 50, s: 5 };
let k = {};

const PLAYER_ID = Math.random().toString(36).substring(2, 10);

// ATENÇÃO: use wss em produção (Render)
const WS_URL = "wss://meu-backend-0rzt.onrender.com";

let players = {};

// resize
window.onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
window.onresize();

// input
onkeydown = e => k[e.key] = 1;
onkeyup = e => k[e.key] = 0;

// conexão websocket
const ws = new WebSocket(WS_URL);

ws.onopen = () => {
    ws.send(JSON.stringify({
        type: "join",
        id: PLAYER_ID
    }));
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "state") {
        players = data.players;
    }
};

// loop principal (render + input)
function loop() {

    // movimento local (fluido)
    if (k.ArrowUp || k.w) p.y -= p.s;
    if (k.ArrowDown || k.s) p.y += p.s;
    if (k.ArrowLeft || k.a) p.x -= p.s;
    if (k.ArrowRight || k.d) p.x += p.s;

    p.x = Math.max(0, Math.min(c.width - 30, p.x));
    p.y = Math.max(0, Math.min(c.height - 30, p.y));

    // envia posição em tempo real
    if (ws.readyState === 1) {
        ws.send(JSON.stringify({
            type: "move",
            id: PLAYER_ID,
            x: p.x,
            y: p.y
        }));
    }

    // render
    x.fillStyle = "#fff";
    x.fillRect(0, 0, c.width, c.height);

    for (let id in players) {
        const pl = players[id];
        if (!pl) continue;

        let color = "#" + intToColor(id);

        x.fillStyle = color;
        x.fillRect(pl.x, pl.y, 30, 30);
    }

    requestAnimationFrame(loop);
}

loop();

// cor estável por ID
function intToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    let color = (hash & 0x00FFFFFF).toString(16).toUpperCase();
    return "000000".substring(0, 6 - color.length) + color;
}
</script>

</body>
</html>
