<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">

<canvas id="g"></canvas>

<div style="position:fixed; top:10px; right:10px; font-family:sans-serif;">
    Volta: <span id="lap">1</span>/5
</div>

<script>
const c = g;
const x = c.getContext("2d");

// ==========================
// CONFIG
// ==========================
const PLAYER_ID = Math.random().toString(36).slice(2,9);
const PLAYER_COLOR = "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
const WS_URL = "wss://meu-backend-0rzt.onrender.com";

// ==========================
// TRACK
// ==========================
const track = {};

// ==========================
// PLAYER LOCAL
// ==========================
let p = {
    x: 0,
    y: 0,
    angle: Math.PI,
    speed: 0,
    lap: 1,
    stage: 0,
    lastCross: false,
    boost: 0,
    tyre: 100,
    isBoosting: false
};

// OUTROS JOGADORES
let players = {};

// ==========================
// INPUT
// ==========================
let k = {};
onkeydown = e => k[e.key.toLowerCase()] = 1;
onkeyup = e => k[e.key.toLowerCase()] = 0;

// ==========================
// RESIZE
// ==========================
onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;

    track.w = c.width;
    track.h = c.height;

    track.innerW = track.w * 0.6;
    track.innerH = track.h * 0.5;
    track.innerX = (track.w - track.innerW)/2;
    track.innerY = (track.h - track.innerH)/2;

    p.x = track.w / 2;
    p.y = track.innerY / 2;
};
onresize();

// ==========================
// WEBSOCKET
// ==========================
const ws = new WebSocket(WS_URL);

ws.onopen = () => {
    ws.send(JSON.stringify({
        type: "join",
        id: PLAYER_ID,
        color: PLAYER_COLOR
    }));
};

ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if(data.type === "state"){
        players = data.players;
    }
};

// envio
setInterval(()=>{
    if(ws.readyState !== 1) return;

    ws.send(JSON.stringify({
        type:"move",
        id: PLAYER_ID,
        x: p.x,
        y: p.y,
        angle: p.angle,
        color: PLAYER_COLOR,
        lap: p.lap
    }));
},50);

// ==========================
// LOOP
// ==========================
function loop(){

    // direção
    if(k["arrowleft"]||k["a"]) p.angle -= 0.05;
    if(k["arrowright"]||k["d"]) p.angle += 0.05;

    let accel = k["arrowup"]||k["w"];
    let brake = k["arrowdown"]||k["s"];

    if(accel){
        p.speed += 0.3;
        if(p.speed > 8) p.speed = 8;
    }

    if(brake){
        p.speed *= 0.85;
    }

    if(!accel && !brake){
        p.speed *= 0.99;
    }

    // movimento
    let nx = p.x + Math.cos(p.angle)*p.speed;
    let ny = p.y + Math.sin(p.angle)*p.speed;

    let hit =
        nx < 10 || nx > track.w-10 ||
        ny < 10 || ny > track.h-10 ||
        (nx>track.innerX && nx<track.innerX+track.innerW &&
         ny>track.innerY && ny<track.innerY+track.innerH);

    if(!hit){
        p.x = nx;
        p.y = ny;
    } else {
        p.speed *= -0.3;
    }

    // LAP SYSTEM
    if(p.stage==0 && p.x < track.innerX) p.stage=1;
    if(p.stage==1 && p.y > track.innerY+track.innerH) p.stage=2;
    if(p.stage==2 && p.x > track.innerX+track.innerW) p.stage=3;

    let cross = (p.stage==3 && p.x < track.w/2 && p.y < track.innerY);
    if(cross && !p.lastCross){
        if(p.lap < 5){
            p.lap++;
            lap.innerText = p.lap;
            p.stage = 0;
        }
    }
    p.lastCross = cross;

    // ======================
    // DRAW
    // ======================
    x.fillStyle="#fff";
    x.fillRect(0,0,c.width,c.height);

    // pista
    x.strokeStyle="#000";
    x.lineWidth=5;
    x.strokeRect(0,0,track.w,track.h);

    x.lineWidth=2;
    x.strokeRect(track.innerX,track.innerY,track.innerW,track.innerH);

    // linha chegada
    x.beginPath();
    x.moveTo(track.w/2,0);
    x.lineTo(track.w/2,track.innerY);
    x.stroke();

    // OUTROS
    for(let id in players){
        if(id === PLAYER_ID) continue;

        let pl = players[id];

        x.save();
        x.translate(pl.x, pl.y);
        x.rotate(pl.angle || 0);

        x.fillStyle = pl.color || "#999";
        x.fillRect(-15,-15,30,30);

        x.restore();
    }

    // VOCÊ
    x.save();
    x.translate(p.x,p.y);
    x.rotate(p.angle);
    x.fillStyle = PLAYER_COLOR;
    x.fillRect(-15,-15,30,30);
    x.restore();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
