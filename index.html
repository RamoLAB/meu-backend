<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">

<canvas id="g"></canvas>

<!-- PEDAIS MINIMAL -->
<div style="position:fixed; bottom:20px; right:20px; display:flex; gap:12px;">
    
    <div id="brake" style="
        width:80px; height:80px;
        border:2px solid rgba(200,200,200,0.5);
        border-radius:12px;
        display:flex; align-items:center; justify-content:center;
        color:rgba(200,200,200,0.7);
        font-family:sans-serif;
        user-select:none;
    ">BRAKE</div>

    <div id="gas" style="
        width:80px; height:80px;
        border:2px solid rgba(200,200,200,0.5);
        border-radius:12px;
        display:flex; align-items:center; justify-content:center;
        color:rgba(200,200,200,0.7);
        font-family:sans-serif;
        user-select:none;
    ">GAS</div>

</div>

<script>
const c = g;
const x = c.getContext("2d");

let p = { x:200, y:200, angle:0, speed:0 };

let k = {};
let accelerating = false;
let braking = false;

const PLAYER_ID = Math.random().toString(36).substring(2, 10);
const WS_URL = "wss://meu-backend-0rzt.onrender.com";

let stateBuffer = [];
const RENDER_DELAY = 80; // leve aumento → reduz jitter

// =====================
// COR CONSISTENTE
// =====================
function idToColor(id){
    let hash = 0;
    for(let i=0;i<id.length;i++){
        hash = id.charCodeAt(i) + ((hash<<5)-hash);
    }

    let r = 100 + ((hash>>0)&155);
    let g = 100 + ((hash>>8)&155);
    let b = 100 + ((hash>>16)&155);

    return `rgb(${r},${g},${b})`;
}

const MY_COLOR = idToColor(PLAYER_ID);

// resize
onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
onresize();

// teclado
onkeydown = e => k[e.key.toLowerCase()] = 1;
onkeyup = e => k[e.key.toLowerCase()] = 0;

// pedais
gas.onmousedown = () => accelerating = true;
gas.onmouseup = () => accelerating = false;
gas.onmouseleave = () => accelerating = false;

brake.onmousedown = () => braking = true;
brake.onmouseup = () => braking = false;
brake.onmouseleave = () => braking = false;

// websocket
const ws = new WebSocket(WS_URL);

ws.onopen = () => {
    ws.send(JSON.stringify({ type:"join", id:PLAYER_ID }));
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if(data.type === "state"){
        stateBuffer.push({
            time: Date.now(),
            players: data.players
        });

        if(stateBuffer.length > 25) stateBuffer.shift();
    }
};

// envio
setInterval(()=>{
    if(ws.readyState !== 1) return;

    ws.send(JSON.stringify({
        type:"move",
        id:PLAYER_ID,
        x:p.x,
        y:p.y
    }));
},50);

// =====================
// LOOP
// =====================
function loop(){

    // direção
    if(k["arrowleft"]||k["a"]||k["arrowup"]||k["w"]) p.angle -= 0.05;
    if(k["arrowright"]||k["d"]||k["arrowdown"]||k["s"]) p.angle += 0.05;

    // aceleração
    if(accelerating){
        p.speed += 0.2;
        if(p.speed > 5) p.speed = 5;
    }

    // freio
    if(braking){
        p.speed *= 0.7;
        if(p.speed < 0.05) p.speed = 0;
    }

    // inércia
    if(!accelerating && !braking){
        p.speed *= 0.985;
    }

    // movimento
    p.x += Math.cos(p.angle) * p.speed;
    p.y += Math.sin(p.angle) * p.speed;

    // limites
    p.x = Math.max(0, Math.min(c.width, p.x));
    p.y = Math.max(0, Math.min(c.height, p.y));

    // render base
    x.fillStyle = "#fff";
    x.fillRect(0,0,c.width,c.height);

    const renderTime = Date.now() - RENDER_DELAY;

    let older=null, newer=null;

    for(let i=0;i<stateBuffer.length-1;i++){
        if(
            stateBuffer[i].time <= renderTime &&
            stateBuffer[i+1].time >= renderTime
        ){
            older = stateBuffer[i];
            newer = stateBuffer[i+1];
            break;
        }
    }

    // =====================
    // DESENHO ESTÁVEL (SEM PISCAR)
    // =====================

    if(older && newer){

        const t = (renderTime - older.time) / (newer.time - older.time);

        for(let id in newer.players){

            if(id === PLAYER_ID) continue;

            const p1 = older.players[id];
            const p2 = newer.players[id];
            if(!p1 || !p2) continue;

            const ix = p1.x + (p2.x - p1.x) * t;
            const iy = p1.y + (p2.y - p1.y) * t;

            x.fillStyle = idToColor(id);
            x.fillRect(ix, iy, 30, 30);
        }
    }
    else if(stateBuffer.length > 0){

        // fallback ESTÁVEL (sem alternância)
        const latest = stateBuffer[stateBuffer.length - 1];

        for(let id in latest.players){

            if(id === PLAYER_ID) continue;

            const pl = latest.players[id];

            x.fillStyle = idToColor(id);
            x.fillRect(pl.x, pl.y, 30, 30);
        }
    }

    // seu carro
    x.save();
    x.translate(p.x, p.y);
    x.rotate(p.angle);
    x.fillStyle = MY_COLOR;
    x.fillRect(-15, -15, 30, 30);
    x.restore();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
