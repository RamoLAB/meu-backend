<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#ccc">
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// =========================
// PLAYER
// =========================
let car = {
    x: 300,
    y: 300,
    angle: 0,

    speed: 0,
    maxSpeed: 8,
    accel: 0.4,
    friction: 0.96,
    turnSpeed: 0.05,

    width: 30,
    height: 30,

    lap: 0,
    lastCross: 0
};

let keys = {};
onkeydown = e => keys[e.key] = 1;
onkeyup = e => keys[e.key] = 0;

// =========================
// TRACK
// =========================
const track = {
    startLine: { x: 500, y: 200, w: 200, h: 10 }
};

// =========================
// UPDATE
// =========================
function update() {

    if (keys.ArrowUp || keys.w) car.speed += car.accel;
    if (keys.ArrowDown || keys.s) car.speed -= car.accel;

    car.speed = Math.max(-car.maxSpeed/2, Math.min(car.maxSpeed, car.speed));

    if (keys.ArrowLeft || keys.a) {
        car.angle -= car.turnSpeed * (car.speed / car.maxSpeed);
    }

    if (keys.ArrowRight || keys.d) {
        car.angle += car.turnSpeed * (car.speed / car.maxSpeed);
    }

    car.x += Math.cos(car.angle) * car.speed;
    car.y += Math.sin(car.angle) * car.speed;

    car.speed *= car.friction;

    const now = Date.now();

    if (
        car.x > track.startLine.x &&
        car.x < track.startLine.x + track.startLine.w &&
        car.y > track.startLine.y &&
        car.y < track.startLine.y + track.startLine.h
    ) {
        if (now - car.lastCross > 1000 && car.speed > 1) {
            car.lap++;
            car.lastCross = now;
        }
    }
}

// =========================
// DRAW CAR
// =========================
function drawCar(c) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.angle);

    ctx.fillStyle = "#ff0000";
    ctx.fillRect(-15, -15, 30, 30);

    ctx.restore();
}

// =========================
// DRAW
// =========================
function draw() {

    // FUNDO CINZA
    ctx.fillStyle = "#ccc";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // PISTA
    ctx.fillStyle = "#777";
    ctx.fillRect(200, 100, 800, 400);

    // LINHA DE CHEGADA
    ctx.fillStyle = "#000";
    ctx.fillRect(
        track.startLine.x,
        track.startLine.y,
        track.startLine.w,
        track.startLine.h
    );

    drawCar(car);

    // HUD simples
    ctx.fillStyle = "#000";
    ctx.font = "16px Arial";
    ctx.fillText("Vel: " + car.speed.toFixed(2), 20, 30);
    ctx.fillText("Volta: " + car.lap, 20, 50);
}

// =========================
// LOOP
// =========================
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
