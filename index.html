<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:#fff">

<canvas id="g"></canvas>

<!-- HUD -->
<div style="position:fixed; top:10px; left:10px; font-family:sans-serif;">
    Volta: <span id="lap">1</span>/5
</div>

<!-- PEDAIS -->
<div style="position:fixed; bottom:20px; right:20px; display:flex; gap:12px;">
    <div id="brake" style="width:80px;height:80px;border:2px solid rgba(200,200,200,0.5);border-radius:12px;display:flex;align-items:center;justify-content:center;">BRAKE</div>
    <div id="gas" style="width:80px;height:80px;border:2px solid rgba(200,200,200,0.5);border-radius:12px;display:flex;align-items:center;justify-content:center;">GAS</div>
</div>

<script>
const c = g;
const x = c.getContext("2d");

let p = {
    x: 400,
    y: 300,
    angle: 0,
    speed: 0,
    lap: 1,
    lastCross: false
};

let k = {};
let accelerating = false;
let braking = false;

// pista
const track = {
    cx: 600,
    cy: 400,
    rx: 300,
    ry: 200,
    width: 80
};

// linha de chegada (vertical)
const finishLineX = track.cx;

// resize
onresize = () => {
    c.width = innerWidth;
    c.height = innerHeight;
};
onresize();

// teclado
onkeydown = e => k[e.key.toLowerCase()] = 1;
onkeyup = e => k[e.key.toLowerCase()] = 0;

// pedais
gas.onmousedown = () => accelerating = true;
gas.onmouseup = () => accelerating = false;
gas.onmouseleave = () => accelerating = false;

brake.onmousedown = () => braking = true;
brake.onmouseup = () => braking = false;
brake.onmouseleave = () => braking = false;

// loop
function loop(){

    // direção
    if(k["arrowleft"]||k["a"]||k["arrowup"]||k["w"]) p.angle -= 0.05;
    if(k["arrowright"]||k["d"]||k["arrowdown"]||k["s"]) p.angle += 0.05;

    // aceleração
    if(accelerating){
        p.speed += 0.2;
        if(p.speed > 6) p.speed = 6;
    }

    // freio
    if(braking){
        p.speed *= 0.7;
        if(p.speed < 0.05) p.speed = 0;
    }

    // inércia
    if(!accelerating && !braking){
        p.speed *= 0.99;
    }

    // movimento
    p.x += Math.cos(p.angle) * p.speed;
    p.y += Math.sin(p.angle) * p.speed;

    // =====================
    // DETECÇÃO DE VOLTA
    // =====================
    let crossing = (p.x > finishLineX && p.y > track.cy);

    if(crossing && !p.lastCross){
        if(p.lap < 5){
            p.lap++;
            document.getElementById("lap").innerText = p.lap;
        }
    }

    p.lastCross = crossing;

    // =====================
    // RENDER
    // =====================
    x.fillStyle = "#fff";
    x.fillRect(0,0,c.width,c.height);

    // pista (asfalto)
    x.fillStyle = "#555";
    x.beginPath();
    x.ellipse(track.cx, track.cy, track.rx, track.ry, 0, 0, Math.PI*2);
    x.fill();

    // miolo (grama)
    x.fillStyle = "#2e8b57";
    x.beginPath();
    x.ellipse(track.cx, track.cy, track.rx-track.width, track.ry-track.width, 0, 0, Math.PI*2);
    x.fill();

    // linha chegada
    x.strokeStyle = "#fff";
    x.lineWidth = 4;
    x.beginPath();
    x.moveTo(finishLineX, track.cy - track.ry);
    x.lineTo(finishLineX, track.cy + track.ry);
    x.stroke();

    // carro
    x.save();
    x.translate(p.x, p.y);
    x.rotate(p.angle);
    x.fillStyle = "#000";
    x.fillRect(-15, -15, 30, 30);
    x.restore();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
